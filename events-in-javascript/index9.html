<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>click me!</button>
</body>
<script>
  let btn = document.querySelector('button')
  btn.addEventListener('click',function(e){
  
    // 1. Get the "Start Time" of the page
    const start = performance.timeOrigin;
    
    // 2. Get the "Duration" until the click
    const duration = e.timeStamp;
    
    // 3. Combine them to get the real Date
    const absoluteTime = start + duration;
    const dateOfClick = new Date(absoluteTime);
    
    console.log("You clicked at:", dateOfClick.toString());

  })
</script>
</html>
